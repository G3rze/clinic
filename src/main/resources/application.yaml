spring:
  application:
    name: clinic
  datasource:
    url: jdbc:postgresql://${DB_HOST:172.17.0.2}:${DB_PORT:5432}/${DB_NAME:ncapas}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  config:
    import: optional:.env

encryption:
  key: ${ENCRYPTION_KEY}

google:
  api:
    base-url: ${GOOGLE_BASE_URL:https://www.googleapis.com}
    calendar-url: ${GOOGLE_CALENDAR_URL:https://calendar.googleapis.com}
    token-url: ${GOOGLE_TOKEN_URL:https://oauth2.googleapis.com}
  credentials:
    path: ${GOOGLE_CREDENTIALS_PATH:credentials.json}
  session:
    cleanup-interval-ms: ${GOOGLE_SESSION_CLEANUP_INTERVAL_MS:1800000}
